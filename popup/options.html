<!DOCTYPE html>
<html>
<head>
  <title>Extension Settings</title>
  <style>
    body { padding: 20px; font-family: sans-serif; background: #f4f4f4; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    select { padding: 8px; width: 100%; margin: 10px 0; }
  </style>
  <link rel="stylesheet" href="./optionStyles.css">
  <link rel="stylesheet" href="../assets/font-awesome-4.7.0/css/font-awesome.min.css">
</head>
<body>
<div id="db-status-banner" style="display: none;"> <i class="fa fa-info-circle" aria-hidden="true"></i> <span id="db-status-banner-text"></span></div>
  <div class="card" id="configDiv">
    <h1>Configuration</h1>
    <label for="deckSelect">Target Anki Deck:</label>
    <select id="deckSelect">
      <option>Loading decks...</option>
    </select>
    <label for="noteType">Select Note Type:</label>
    <select id="noteType">
        <option>Loading available note types</option>
    </select>
    <div id="fieldsDiv"></div>
    <button id="saveBtn">Save Settings</button>
  </div>
  <script src="/src/vendor/browser-polyfill.js"></script>
  <script type='module' src="/popup/options.js"></script>
</body>
</html>
