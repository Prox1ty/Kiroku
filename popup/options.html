<!DOCTYPE html>
<html>
<head>
  <title>Extension Settings</title>
  <style>
body { 
    padding: 20px; 
    font-family: sans-serif; 
    background: #f4f4f4; 
}
.card { 
    background: white; 
    padding: 20px; 
    border-radius: 8px; 
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
select {
    padding: 8px;
    width: 100%;
    margin: 10px 0;
    }

#field-div {
margin-top: 20px;
border-top: 1px solid #ddd;
padding-top: 15px;
}

.field-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 15px;
}

.field-row label {
    flex: 0 0 120px;
    font-weight: bold;
}

.field-input {
    flex: 1;
    padding: 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
  </style>
</head>
<body>
  <div class="card">
    <h1>Configuration</h1>
    <label for="deckSelect">Target Anki Deck:</label>
    <select id="deckSelect">
      <option>Loading decks...</option>
    </select>
    <label for="noteTypeSelect">Select Note Type:</label>
    <select id="noteTypeSelect">
        <option>Loading available note types</option>
    </select>
    <div id="field-div">

    </div>
    <button id="saveBtn">Save Settings</button>
  </div>
  <script src="/browser-polyfill.js"></script>
  <script src="/anki.js"></script>
  <script src="/popup/options.js"></script>
</body>
</html>
